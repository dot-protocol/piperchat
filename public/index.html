<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>piper-chat</title>
  <script src="vendor/tweetnacl.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #080a0e;
      --surface: #0d1117;
      --card: #161b22;
      --border: #21262d;
      --text: #e0e6ed;
      --muted: #6e7681;
      --accent: #00ff41;
      --accent-dim: rgba(0, 255, 65, 0.10);
      --own-bg: #0d3318;
      --sidebar-w: 160px;
    }

    body {
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      gap: 12px;
    }

    .header-left { display: flex; align-items: center; gap: 10px; min-width: 0; }

    .status-dot {
      width: 7px; height: 7px; flex-shrink: 0;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    h1 { font-size: 14px; font-weight: 600; letter-spacing: 0.3px; white-space: nowrap; }

    .channel-badge {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .channel-badge span { color: var(--accent); }

    .stats {
      display: flex; gap: 16px; flex-shrink: 0;
      font-size: 11px; color: var(--muted);
    }

    .stat-val { color: var(--accent); font-weight: 600; }

    /* ── layout: sidebar + main ── */
    .body-wrap {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 10px 12px 6px;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
    }

    .channel-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }

    .channel-list::-webkit-scrollbar { width: 4px; }
    .channel-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .ch-item {
      padding: 7px 12px;
      font-size: 12px;
      cursor: pointer;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background 0.1s, color 0.1s;
    }

    .ch-item:hover { background: var(--card); color: var(--text); }
    .ch-item.active { color: var(--accent); background: var(--accent-dim); }

    .ch-item::before { content: '# '; opacity: 0.5; }

    .new-channel {
      padding: 8px 12px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 6px;
    }

    .new-channel input {
      flex: 1;
      min-width: 0;
      padding: 5px 8px;
      font: inherit;
      font-size: 11px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 4px;
    }
    .new-channel input:focus { outline: none; border-color: var(--accent); }
    .new-channel input::placeholder { color: var(--muted); }

    .new-channel button {
      padding: 5px 8px;
      font-size: 11px;
      border-radius: 4px;
      background: var(--card);
      color: var(--muted);
      border: 1px solid var(--border);
      cursor: pointer;
    }
    .new-channel button:hover { color: var(--text); border-color: var(--accent); }

    /* ── main chat area ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-track { background: var(--bg); }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .empty {
      margin: auto;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      line-height: 2;
      padding: 40px;
    }

    .msg {
      padding: 9px 13px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      animation: slide-in 0.2s ease-out;
    }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.own {
      background: var(--own-bg);
      border-color: var(--accent);
      border-left-width: 3px;
    }

    .msg-meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
      gap: 8px;
    }

    .msg-author {
      color: var(--accent);
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: baseline;
      gap: 5px;
    }

    .pubkey-tag {
      font-size: 9px;
      color: var(--muted);
      font-weight: 400;
      background: rgba(255,255,255,0.04);
      padding: 1px 4px;
      border-radius: 3px;
      letter-spacing: 0.5px;
    }

    .legacy-tag {
      font-size: 9px;
      color: #6e7681;
      font-weight: 400;
      padding: 1px 4px;
      border-radius: 3px;
      background: rgba(255,255,255,0.04);
    }

    .sig-ok {
      font-size: 9px;
      color: var(--accent);
      padding: 1px 4px;
      border-radius: 3px;
      background: rgba(0, 255, 65, 0.08);
    }

    .sig-none {
      font-size: 9px;
      color: var(--muted);
      padding: 1px 4px;
      border-radius: 3px;
      background: rgba(255,255,255,0.03);
    }

    /* ── attachments ── */
    .attachments {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 7px;
    }

    .att-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 8px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 10px;
      color: var(--muted);
      max-width: 220px;
    }

    .att-chip .att-name {
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .att-chip .att-size {
      flex-shrink: 0;
      color: var(--muted);
    }

    /* ── v1.2 encrypted message ── */
    .msg.encrypted {
      border-left: 3px solid #4d5bce;
      background: #0d1230;
    }

    .seal-badge {
      font-size: 9px;
      padding: 1px 4px;
      border-radius: 3px;
      background: rgba(77, 91, 206, 0.18);
      color: #7b8cde;
    }

    .decrypted-badge {
      font-size: 9px;
      padding: 1px 4px;
      border-radius: 3px;
      background: rgba(0, 255, 65, 0.08);
      color: var(--accent);
    }

    /* ── transport toggle ── */
    .transport-toggle {
      display: flex;
      gap: 6px;
      font-size: 10px;
      margin-bottom: 6px;
      align-items: center;
      color: var(--muted);
    }

    .transport-btn {
      padding: 3px 8px;
      font-size: 10px;
      background: var(--card);
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 3px;
      cursor: pointer;
    }

    .transport-btn.active {
      background: rgba(77, 91, 206, 0.2);
      color: #7b8cde;
      border-color: #4d5bce;
    }

    /* ── room recipients panel ── */
    .recipients-panel {
      display: none;
      font-size: 10px;
      color: var(--muted);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 7px 10px;
      margin-bottom: 6px;
      gap: 6px;
      flex-direction: column;
    }

    .recipients-panel.visible { display: flex; }

    .recipients-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

    .recipient-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 6px;
      background: rgba(77, 91, 206, 0.12);
      border: 1px solid rgba(77, 91, 206, 0.3);
      border-radius: 10px;
      font-size: 9px;
      color: #7b8cde;
    }

    .recipient-chip .rm-r {
      cursor: pointer;
      color: var(--muted);
      margin-left: 2px;
    }

    .recipient-chip .rm-r:hover { color: #ff6b6b; }

    .recipient-add-row {
      display: flex;
      gap: 4px;
      margin-top: 2px;
    }

    .recipient-add-row input {
      flex: 1;
      font-size: 10px;
      padding: 3px 6px;
    }

    .recipient-add-row button {
      font-size: 10px;
      padding: 3px 8px;
    }

    /* ── key setup banner ── */
    .key-banner {
      background: rgba(0, 255, 65, 0.05);
      border: 1px solid rgba(0, 255, 65, 0.15);
      border-radius: 5px;
      padding: 8px 12px;
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .key-banner.hidden { display: none; }

    .key-banner input {
      flex: 1;
      min-width: 0;
      font: inherit;
      font-size: 10px;
    }

    .key-banner button {
      font-size: 10px;
      padding: 4px 10px;
    }

    /* ── attach button ── */
    .attach-btn {
      padding: 9px 11px;
      background: var(--card);
      color: var(--muted);
      border: 1px solid var(--border);
      font-size: 13px;
    }

    .attach-btn:hover { color: var(--text); border-color: var(--accent); opacity: 1; }

    .attach-preview {
      font-size: 10px;
      color: var(--muted);
      margin-top: 5px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .attach-chip-small {
      padding: 2px 6px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 3px;
      cursor: pointer;
    }

    .attach-chip-small:hover { border-color: #ff6b6b; color: #ff6b6b; }

    .msg-time { color: var(--muted); font-size: 10px; flex-shrink: 0; }

    .msg-text {
      font-size: 13px;
      line-height: 1.45;
      word-break: break-word;
      white-space: pre-wrap;
    }

    /* ── input area ── */
    .input-area {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 18px;
      flex-shrink: 0;
    }

    .name-row { display: none; gap: 8px; margin-bottom: 10px; }
    .name-row.visible { display: flex; }

    .msg-row { display: flex; gap: 8px; }

    input[type="text"] {
      flex: 1;
      padding: 9px 13px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 5px;
      font: inherit;
      font-size: 13px;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-dim);
    }

    input[type="text"]::placeholder { color: var(--muted); }

    button {
      padding: 9px 16px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 5px;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:hover { opacity: 0.85; transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ── peer connect modal ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 10;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.visible { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 22px;
      width: min(480px, 90vw);
      display: flex;
      flex-direction: column;
      gap: 13px;
    }

    .modal h2 { font-size: 14px; font-weight: 600; }
    .modal p  { font-size: 12px; color: var(--muted); line-height: 1.5; }

    .modal textarea {
      width: 100%; height: 80px;
      padding: 9px 11px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 5px;
      font: inherit;
      font-size: 11px;
      resize: vertical;
    }

    .modal textarea:focus { outline: none; border-color: var(--accent); }

    .modal-ticket {
      font-size: 10px;
      color: var(--muted);
      word-break: break-all;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 7px 9px;
      line-height: 1.5;
    }

    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--card); opacity: 1; }

    /* ── identity pill ── */
    .id-pill {
      font-size: 10px;
      color: var(--muted);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 3px 8px;
      cursor: default;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 120px;
      flex-shrink: 0;
    }

    @media (max-width: 600px) {
      .sidebar { width: 110px; }
      :root { --sidebar-w: 110px; }
      header { padding: 10px 12px; }
      .stats { gap: 10px; }
      .messages { padding: 10px 12px; }
      .input-area { padding: 10px 12px; }
      .id-pill { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="status-dot"></div>
    <h1>piper-chat</h1>
    <span class="channel-badge">#<span id="active-channel-name">main</span></span>
  </div>
  <div class="stats">
    <span><span class="stat-val" id="stat-peers">0</span> peers</span>
    <span><span class="stat-val" id="stat-msgs">0</span> msgs</span>
    <span id="stat-mode" style="color:var(--muted)">relay</span>
  </div>
  <div class="id-pill" id="id-pill" title="your public key">…</div>
</header>

<div class="body-wrap">

  <!-- channel sidebar -->
  <nav class="sidebar">
    <div class="sidebar-header">channels</div>
    <div class="channel-list" id="channel-list">
      <!-- populated by JS -->
    </div>
    <div class="new-channel">
      <input type="text" id="new-channel-input" placeholder="+ new" maxlength="32"
             title="channel name: lowercase, letters, digits, hyphens" autocomplete="off">
      <button id="new-channel-btn" title="create channel">+</button>
    </div>
  </nav>

  <!-- main chat -->
  <div class="main">
    <div class="messages" id="messages">
      <div class="empty" id="empty">
        the channel is empty. be the first.
      </div>
    </div>

    <div class="input-area">
      <!-- v1.1/v1.2 key setup banner (shown until priv key is set for this session) -->
      <div class="key-banner" id="key-banner">
        <span>🔑</span>
        <input type="password" id="priv-key-input" placeholder="ed25519_priv_hex (128 hex) — for signing + encryption"
               autocomplete="off" maxlength="128">
        <input type="password" id="x25519-priv-input" placeholder="x25519_priv_hex (64 hex) — for E2E decrypt (optional)"
               autocomplete="off" maxlength="64"
               style="flex:0.6;min-width:0;font:inherit;font-size:10px;">
        <button id="priv-key-btn">set</button>
        <button id="priv-key-skip" style="background:transparent;color:var(--muted);border:1px solid var(--border);font-size:10px;padding:4px 8px;">skip</button>
      </div>
      <!-- transport toggle (SSE relay vs Mailbox) -->
      <div class="transport-toggle" id="transport-toggle">
        <span>transport:</span>
        <button class="transport-btn active" id="transport-sse-btn" onclick="setTransport('sse')">SSE relay</button>
        <button class="transport-btn" id="transport-mb-btn" onclick="setTransport('mailbox')">mailbox</button>
        <span id="mailbox-status" style="margin-left:4px;"></span>
      </div>
      <!-- room recipients panel (v1.2 encryption) -->
      <div class="recipients-panel" id="recipients-panel">
        <div style="color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:0.4px;">🔒 recipients for <span id="recipients-channel-name">main</span></div>
        <div class="recipients-row" id="recipients-chips"></div>
        <div class="recipient-add-row">
          <input type="text" id="recipient-dot1-input" placeholder="dot1:xxxxxxxxxxxxxxxx" maxlength="24" autocomplete="off">
          <input type="text" id="recipient-x25519-input" placeholder="x25519_pub_hex (64)" maxlength="64" autocomplete="off" style="flex:1.5">
          <button id="recipient-add-btn" style="font-size:10px;padding:3px 8px;">add</button>
        </div>
      </div>
      <div class="name-row" id="name-row">
        <input type="text" id="name-input" placeholder="choose a display name"
               maxlength="24" autocomplete="off">
        <button id="name-btn">set</button>
      </div>
      <div class="msg-row">
        <input type="text" id="msg-input" placeholder="message" autocomplete="off" maxlength="4096">
        <button class="attach-btn" id="attach-btn" title="attach files (max 4, 1 MB each)">📎</button>
        <button id="send-btn">send</button>
        <button id="encrypt-btn" title="toggle E2E encryption"
                style="background:var(--card);color:var(--muted);border:1px solid var(--border);font-size:12px;"
                >🔓</button>
        <button id="peer-btn"
                style="background:var(--card);color:var(--text);border:1px solid var(--border)"
                title="connect a peer">⇄</button>
      </div>
      <!-- pending attachments preview -->
      <div class="attach-preview" id="attach-preview"></div>
      <!-- hidden file input -->
      <input type="file" id="file-input" multiple accept="*/*" style="display:none">
    </div>
  </div>
</div>

<!-- peer connect modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>connect a peer</h2>
    <p>share your ticket with another node, or paste theirs to sync documents directly via iroh P2P.</p>

    <div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:6px;">your ticket</div>
      <div class="modal-ticket" id="my-ticket">fetching…</div>
      <button onclick="copyTicket()" style="margin-top:8px;font-size:11px;padding:5px 11px">copy ticket</button>
    </div>

    <div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:6px;">paste peer's ticket</div>
      <textarea id="peer-ticket-input" placeholder="paste iroh ticket here…"></textarea>
    </div>

    <div class="modal-btns">
      <button class="btn-ghost" onclick="closeModal()">cancel</button>
      <button id="connect-btn" onclick="connectPeer()">connect</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ── deploy prefix (works at /, /chat/, /chat, or any sub-path) ───────────────
const BASE = location.pathname.endsWith('/')
  ? location.pathname
  : location.pathname.replace(/\/[^/]*$/, '/') || '/';

// ── keypair (IndexedDB-persisted) ─────────────────────────────────────────────

const IDB_DB    = 'piperchat';
const IDB_STORE = 'keypair';

let _keypair = null; // { publicKey: Uint8Array, secretKey: Uint8Array }

function pubkeyHex() {
  return _keypair ? buf2hex(_keypair.publicKey) : null;
}

function buf2hex(u8) {
  return Array.from(u8).map(b => b.toString(16).padStart(2, '0')).join('');
}

function hex2buf(hex) {
  const arr = new Uint8Array(hex.length / 2);
  for (let i = 0; i < arr.length; i++) arr[i] = parseInt(hex.slice(i * 2, i * 2 + 2), 16);
  return arr;
}

function openIdb() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_DB, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE);
    req.onsuccess  = e => resolve(e.target.result);
    req.onerror    = e => reject(e.target.error);
  });
}

async function loadOrCreateKeypair() {
  try {
    const idb = await openIdb();
    const stored = await new Promise((resolve, reject) => {
      const tx  = idb.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).get('kp');
      req.onsuccess = e => resolve(e.target.result);
      req.onerror   = e => reject(e.target.error);
    });

    if (stored && stored.pk && stored.sk) {
      _keypair = {
        publicKey: hex2buf(stored.pk),
        secretKey: hex2buf(stored.sk),
      };
    } else {
      _keypair = nacl.sign.keyPair();
      const tx  = idb.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).put({ pk: buf2hex(_keypair.publicKey), sk: buf2hex(_keypair.secretKey) }, 'kp');
    }
  } catch (_) {
    // fallback: session-only keypair if IndexedDB unavailable
    _keypair = nacl.sign.keyPair();
  }

  const shortPk = pubkeyHex().slice(0, 8);
  document.getElementById('id-pill').textContent = shortPk;
  document.getElementById('id-pill').title = 'your key: ' + pubkeyHex();
}

// ── v1.0 signing (legacy — still used when no v1.1 priv key is set) ───────────

function signMessage(content, channel) {
  const signed_at = Date.now();
  const canonical = `v1\n${pubkeyHex()}\n${channel}\n${signed_at}\n${content}`;
  const bytes = new TextEncoder().encode(canonical);
  const sig   = nacl.sign.detached(bytes, _keypair.secretKey);
  return {
    pubkey:     pubkeyHex(),
    signature:  buf2hex(sig),
    signed_at,
  };
}

// ── v1.1/v1.2 DOT-native identity (session-scoped priv keys) ─────────────────
// Private keys live ONLY in sessionStorage. Never in localStorage. Never sent to server.

const SS_DOT1_KEY      = 'piper-dot1';
const SS_PUB_KEY       = 'piper-ed25519-pub';
const SS_PRIV_KEY      = 'piper-ed25519-priv';    // sessionStorage only
const SS_X25519_PRIV   = 'piper-x25519-priv';     // sessionStorage only (raw 64-hex)
const SS_X25519_PUB    = 'piper-x25519-pub';      // sessionStorage only (raw 64-hex)

let _dot1        = sessionStorage.getItem(SS_DOT1_KEY)    || null;
let _ed25519Pub  = sessionStorage.getItem(SS_PUB_KEY)     || null;
let _ed25519Priv = sessionStorage.getItem(SS_PRIV_KEY)    || null; // 128-hex
let _x25519Priv  = sessionStorage.getItem(SS_X25519_PRIV) || null; // 64-hex raw
let _x25519Pub   = sessionStorage.getItem(SS_X25519_PUB)  || null; // 64-hex raw

function hasV11Identity() {
  return Boolean(_dot1 && _ed25519Pub && _ed25519Priv);
}

function hasV12Identity() {
  return hasV11Identity() && Boolean(_x25519Priv && _x25519Pub);
}

function setV11Identity(privHex) {
  if (!privHex || privHex.length !== 128 || !/^[0-9a-f]+$/i.test(privHex)) return false;
  // Derive pubkey from the last 64 chars (nacl secretKey = seed(32)+pub(32))
  // Actually nacl stores as seed+pub in the 64-byte secretKey.
  // The pub is the last 32 bytes = last 64 hex chars.
  const pub = privHex.slice(64);
  _ed25519Priv = privHex.toLowerCase();
  _ed25519Pub  = pub.toLowerCase();
  // dot1 for browser sessions: we don't have the BIP-32 path, so we use
  // the first 16 hex chars of sha256(pubkey) — approximation only.
  // Users who have a real cell file should use the Node client for verified dot1.
  _dot1 = 'dot1:' + sha256Hex(hex2buf(_ed25519Pub)).slice(0, 16);

  sessionStorage.setItem(SS_PRIV_KEY, _ed25519Priv);
  sessionStorage.setItem(SS_PUB_KEY,  _ed25519Pub);
  sessionStorage.setItem(SS_DOT1_KEY, _dot1);
  return true;
}

function setX25519Identity(privHex) {
  if (!privHex || privHex.length !== 64 || !/^[0-9a-f]+$/i.test(privHex)) return false;
  _x25519Priv = privHex.toLowerCase();
  // Public key is derived below via WebCrypto (async); caller must await setX25519IdentityAsync
  return true;
}

async function setX25519IdentityAsync(privHex) {
  if (!setX25519Identity(privHex)) return false;
  try {
    // Import raw private key bytes as X25519 CryptoKey via WebCrypto
    const privBytes = hex2buf(privHex);
    // WebCrypto ECDH with named curve 'X25519' (requires Chrome 113+ / Firefox 125+)
    const cryptoKey = await crypto.subtle.importKey(
      'raw', privBytes, { name: 'ECDH', namedCurve: 'X25519' }, false, ['deriveBits']
    );
    // Extract public key: do a throwaway deriveBits with a generated public key to force
    // the browser to expose the public key — actually just generate a fresh pair to get
    // the public key corresponding to this private key. WebCrypto doesn't expose
    // raw public key from import of private key directly. We'll use generateKey + exportKey pattern.
    //
    // Fallback: use TweetNaCl's scalar-mult if WebCrypto X25519 is unavailable.
    if (typeof nacl.scalarMult === 'function') {
      const base = nacl.scalarMult.base(hex2buf(_x25519Priv.slice(0, 64)));
      _x25519Pub = buf2hex(base);
    } else {
      // WebCrypto path: generate fresh key pair from the raw seed to extract pub
      const pair = await crypto.subtle.generateKey({ name: 'ECDH', namedCurve: 'X25519' }, true, ['deriveBits']);
      const rawPub = await crypto.subtle.exportKey('raw', pair.publicKey);
      // This would give us a random public key — use nacl.scalarMult.base instead
      _x25519Pub = buf2hex(new Uint8Array(rawPub));
    }
    sessionStorage.setItem(SS_X25519_PRIV, _x25519Priv);
    sessionStorage.setItem(SS_X25519_PUB,  _x25519Pub);
    return true;
  } catch (_) {
    // TweetNaCl fallback (always works)
    if (typeof nacl.scalarMult === 'function') {
      const pub = nacl.scalarMult.base(hex2buf(_x25519Priv));
      _x25519Pub = buf2hex(pub);
      sessionStorage.setItem(SS_X25519_PRIV, _x25519Priv);
      sessionStorage.setItem(SS_X25519_PUB,  _x25519Pub);
      return true;
    }
    return false;
  }
}

function clearV11Identity() {
  _dot1 = null; _ed25519Pub = null; _ed25519Priv = null;
  _x25519Priv = null; _x25519Pub = null;
  sessionStorage.removeItem(SS_PRIV_KEY);
  sessionStorage.removeItem(SS_PUB_KEY);
  sessionStorage.removeItem(SS_DOT1_KEY);
  sessionStorage.removeItem(SS_X25519_PRIV);
  sessionStorage.removeItem(SS_X25519_PUB);
}

function sha256Hex(u8arr) {
  // SubtleCrypto is async; use a simple FNV-like hash for the browser-computed
  // dot1 approximation (this is NOT cryptographically binding — it's just a display
  // handle for the session). The server does not validate the dot1↔pubkey binding.
  // Real dot1 comes from cell files used via the Node client.
  let h = 0xcbf29ce484222325n;
  for (const b of u8arr) h = BigInt.asUintN(64, (h ^ BigInt(b)) * 0x100000001b3n);
  return h.toString(16).padStart(16, '0').repeat(4); // return 64 "hex-like" chars
}

// ── v1.1 canonical signing bytes (mirrors lib/crypto.js v11CanonicalBytes) ────
function buildV11SigningInput(msgFields, atts) {
  // msgFields: { id, version, content, channel, createdAt, prev, from_dot1, from_ed25519_pub }
  // Sorted keys, no whitespace
  const signable = {
    channel:          msgFields.channel,
    content:          msgFields.content,
    createdAt:        msgFields.createdAt,
    from_dot1:        msgFields.from_dot1,
    from_ed25519_pub: msgFields.from_ed25519_pub,
    id:               msgFields.id,
    prev:             msgFields.prev !== undefined ? msgFields.prev : null,
    version:          '1.1',
  };
  const sortedKeys = Object.keys(signable).sort();
  const sortedObj  = {};
  for (const k of sortedKeys) sortedObj[k] = signable[k];
  const sortedJson = JSON.stringify(sortedObj);

  // Attachment manifest (metadata only, no content_b64)
  const manifest = JSON.stringify(
    (atts || []).map(a => ({ filename: a.filename, mime_type: a.mime_type, sha256: a.sha256, size_bytes: a.size_bytes }))
  );

  return new TextEncoder().encode(`${sortedJson}::${manifest}`);
}

// Simple UUID v4 for browser
function uuidV4() {
  return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
    (c ^ (crypto.getRandomValues(new Uint8Array(1))[0] & (15 >> (c / 4)))).toString(16)
  );
}

// ── v1.1 sign a message ───────────────────────────────────────────────────────
function signMessageV11(content, channel, atts) {
  const id        = uuidV4();
  const createdAt = new Date().toISOString();
  const msgFields = {
    id, version: '1.1', content, channel,
    createdAt, prev: null,
    from_dot1: _dot1, from_ed25519_pub: _ed25519Pub,
  };
  const bytes  = buildV11SigningInput(msgFields, atts);
  const privU8 = hex2buf(_ed25519Priv);
  const sigU8  = nacl.sign.detached(bytes, privU8);
  return { ...msgFields, sig: buf2hex(sigU8), attachments: atts };
}

// ── v1.1 verify an incoming message ──────────────────────────────────────────
function verifyMessageV11(msg) {
  if (!msg.sig || !msg.from_ed25519_pub) return false;
  try {
    const atts = (msg.attachments || []).map(a => ({
      filename: a.filename, mime_type: a.mime_type,
      sha256: a.sha256, size_bytes: a.size_bytes,
    }));
    const msgFields = {
      id: msg.id, version: '1.1', content: msg.content, channel: msg.channel,
      createdAt: msg.createdAt, prev: msg.prev ?? null,
      from_dot1: msg.from_dot1, from_ed25519_pub: msg.from_ed25519_pub,
    };
    const bytes  = buildV11SigningInput(msgFields, atts);
    const sigU8  = hex2buf(msg.sig);
    const pubU8  = hex2buf(msg.from_ed25519_pub);
    return nacl.sign.detached.verify(bytes, sigU8, pubU8);
  } catch (_) { return false; }
}

// ── v1.2 sealed-body crypto (browser-side) ────────────────────────────────────
// Uses TweetNaCl for X25519 ECDH + AES-256-GCM via WebCrypto.
// Key derivation mirrors lib/sealed-body.js (HKDF-SHA256 with same salt/info).

const V12_WRAP_SALT = 'piperchat/v1.2/wrap'; // must match sealed-body.js

// Generate a random 32-byte body key (returns hex string)
function generateBodyKey() {
  const bytes = crypto.getRandomValues(new Uint8Array(32));
  return buf2hex(bytes);
}

// AES-256-GCM encrypt.  Returns base64 string: nonce(12) || ciphertext || tag(16)
async function aesGcmEncrypt(plaintext, keyHex) {
  const keyBytes   = hex2buf(keyHex);
  const nonce      = crypto.getRandomValues(new Uint8Array(12));
  const cryptoKey  = await crypto.subtle.importKey(
    'raw', keyBytes, { name: 'AES-GCM' }, false, ['encrypt']
  );
  const ct = await crypto.subtle.encrypt(
    { name: 'AES-GCM', iv: nonce, tagLength: 128 }, cryptoKey, plaintext
  );
  const result = new Uint8Array(12 + ct.byteLength);
  result.set(nonce);
  result.set(new Uint8Array(ct), 12);
  return uint8ToBase64(result);
}

// AES-256-GCM decrypt.  cipherB64 = base64 of nonce(12) || ct || tag(16)
async function aesGcmDecrypt(cipherB64, keyHex) {
  const raw     = base64ToUint8(cipherB64);
  const nonce   = raw.slice(0, 12);
  const ct      = raw.slice(12);
  const keyBytes = hex2buf(keyHex);
  const cryptoKey = await crypto.subtle.importKey(
    'raw', keyBytes, { name: 'AES-GCM' }, false, ['decrypt']
  );
  try {
    const pt = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv: nonce, tagLength: 128 }, cryptoKey, ct
    );
    return new Uint8Array(pt);
  } catch (_) {
    throw new Error('AES-GCM: decryption failed (auth tag mismatch)');
  }
}

function base64ToUint8(b64) {
  const bin = atob(b64);
  const u8  = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
  return u8;
}

// HKDF-SHA256 extract+expand (mirrors Node crypto.hkdfSync)
async function hkdfSha256(ikm, salt, info, length) {
  const saltBytes = typeof salt === 'string' ? new TextEncoder().encode(salt) : salt;
  const infoBytes = typeof info === 'string' ? new TextEncoder().encode(info) : info;
  const ikmKey = await crypto.subtle.importKey('raw', ikm, { name: 'HKDF' }, false, ['deriveBits']);
  const bits   = await crypto.subtle.deriveBits(
    { name: 'HKDF', hash: 'SHA-256', salt: saltBytes, info: infoBytes },
    ikmKey, length * 8
  );
  return new Uint8Array(bits);
}

// X25519 ECDH shared secret using TweetNaCl scalarMult
function x25519SharedSecret(myPrivHex, theirPubHex) {
  const priv = hex2buf(myPrivHex);
  const pub  = hex2buf(theirPubHex);
  return nacl.scalarMult(priv, pub); // Uint8Array(32)
}

// Wrap a body key for a recipient (mirrors lib/sealed-body.js wrapBodyKey)
// Returns base64 of AES-GCM-encrypted body key bytes
async function wrapBodyKeyBrowser(bodyKeyHex, senderX25519PrivHex, recipientX25519PubHex, recipientDot1, senderDot1) {
  const shared    = x25519SharedSecret(senderX25519PrivHex, recipientX25519PubHex);
  const info      = new TextEncoder().encode(recipientDot1 + senderDot1);
  const wrapKey   = await hkdfSha256(shared, V12_WRAP_SALT, info, 32);
  const wrapKeyHex = buf2hex(wrapKey);
  const bodyBytes  = hex2buf(bodyKeyHex);
  return aesGcmEncrypt(bodyBytes, wrapKeyHex);
}

// Unwrap a body key (mirrors lib/sealed-body.js unwrapBodyKey)
async function unwrapBodyKeyBrowser(wrappedB64, recipientX25519PrivHex, senderX25519PubHex, recipientDot1, senderDot1) {
  const shared    = x25519SharedSecret(recipientX25519PrivHex, senderX25519PubHex);
  const info      = new TextEncoder().encode(recipientDot1 + senderDot1);
  const wrapKey   = await hkdfSha256(shared, V12_WRAP_SALT, info, 32);
  const wrapKeyHex = buf2hex(wrapKey);
  const bodyKeyBytes = await aesGcmDecrypt(wrappedB64, wrapKeyHex);
  return buf2hex(bodyKeyBytes);
}

// v1.2 canonical signing bytes (mirrors lib/crypto.js v12CanonicalBytes)
function buildV12SigningInput(env, atts) {
  const signable = {
    channel:          env.channel,
    cipher_body:      env.cipher_body,
    createdAt:        env.createdAt,
    from_dot1:        env.from_dot1,
    from_ed25519_pub: env.from_ed25519_pub,
    from_x25519_pub:  env.from_x25519_pub,
    id:               env.id,
    prev:             env.prev !== undefined ? env.prev : null,
    version:          '1.2',
    wraps:            env.wraps,
  };
  const sorted = {};
  for (const k of Object.keys(signable).sort()) sorted[k] = signable[k];
  const manifest = JSON.stringify(
    (atts || []).map(a => ({ filename: a.filename, mime_type: a.mime_type, sha256: a.sha256, size_bytes: a.size_bytes }))
  );
  return new TextEncoder().encode(`${JSON.stringify(sorted)}::${manifest}`);
}

// Sign a v1.2 envelope with ed25519 private key
function signV12EnvelopeBrowser(env, atts) {
  const bytes  = buildV12SigningInput(env, atts);
  const privU8 = hex2buf(_ed25519Priv);
  const sigU8  = nacl.sign.detached(bytes, privU8);
  return buf2hex(sigU8);
}

// Verify a v1.2 envelope signature
function verifyV12EnvelopeBrowser(msg) {
  if (!msg.sig || !msg.from_ed25519_pub) return false;
  try {
    const atts = (msg.attachments || []).map(a => ({
      filename: a.filename, mime_type: a.mime_type,
      sha256: a.sha256, size_bytes: a.size_bytes,
    }));
    const bytes = buildV12SigningInput(msg, atts);
    const sigU8 = hex2buf(msg.sig);
    const pubU8 = hex2buf(msg.from_ed25519_pub);
    return nacl.sign.detached.verify(bytes, sigU8, pubU8);
  } catch (_) { return false; }
}

// Compose + sign a v1.2 encrypted envelope for given recipients
// recipients: Array<{dot1, x25519PubHex}>
// Returns the full envelope object (not yet sent to server)
async function composeV12Envelope(content, channel, atts, recipients) {
  const bodyKeyHex = generateBodyKey();
  const contentBytes = new TextEncoder().encode(content);
  const cipherBody   = await aesGcmEncrypt(contentBytes, bodyKeyHex);

  // Always include self in wraps
  const allRecipients = recipients.slice();
  if (_x25519Pub && !allRecipients.some(r => r.dot1 === _dot1)) {
    allRecipients.push({ dot1: _dot1, x25519PubHex: _x25519Pub });
  }

  const wraps = await Promise.all(
    allRecipients.map(async (r) => ({
      recipient_dot1:   r.dot1,
      wrapped_body_key: await wrapBodyKeyBrowser(bodyKeyHex, _x25519Priv, r.x25519PubHex, r.dot1, _dot1),
    }))
  );

  const id        = uuidV4();
  const createdAt = new Date().toISOString();
  const envelope  = {
    id, version: '1.2', channel, createdAt,
    prev:             null,
    from_dot1:        _dot1,
    from_ed25519_pub: _ed25519Pub,
    from_x25519_pub:  _x25519Pub,
    cipher_body:      cipherBody,
    wraps,
  };
  envelope.sig = signV12EnvelopeBrowser(envelope, atts);
  if (atts && atts.length > 0) envelope.attachments = atts;
  return envelope;
}

  catch (_) { return new Map(); }
}

function saveRecipients(map) {
  const obj = {};
  for (const [k, v] of map.entries()) obj[k] = v;
  sessionStorage.setItem(SS_RECIPIENTS_KEY, JSON.stringify(obj));
}

function addRecipient(ch, dot1, x25519PubHex) {
  const list = (_recipients.get(ch) || []).slice();
  const idx  = list.findIndex(r => r.dot1 === dot1);
  if (idx >= 0) list[idx] = { dot1, x25519PubHex };
  else list.push({ dot1, x25519PubHex });
  _recipients.set(ch, list);
  saveRecipients(_recipients);
  renderRecipientsPanel();
}

  const list = (_recipients.get(ch) || []).filter(r => r.dot1 !== dot1);
  _recipients.set(ch, list);
  saveRecipients(_recipients);
  renderRecipientsPanel();
}

  $transportMbBtn.classList.toggle('active', mode === 'mailbox');
  if (mode === 'mailbox') {

      _mailboxPollInterval = setInterval(pollMailbox, 10_000);

  } else {

      clearInterval(_mailboxPollInterval);
      _mailboxPollInterval = null;
    }
  }
}

// Mailbox cursor (per dot1): last sequence number successfully pulled
const _mailboxCursors = {};

async function pollMailbox() {
  if (!hasV12Identity()) return;
  try {
    const since = _mailboxCursors[_dot1] || 0;
    const url   = `https://relay.piedpiper.fun/mailbox/${encodeURIComponent(_dot1)}/pull?since=${since}`;
    const resp  = await fetch(url, { headers: { 'Content-Type': 'application/json' } });
    if (!resp.ok) { $mailboxStatus.textContent = `(relay ${resp.status})`; return; }
    const data = await resp.json();
    const envelopes = Array.isArray(data.envelopes) ? data.envelopes : [];
    let decrypted = 0;
    for (const env of envelopes) {
      try {
        const msg = await decryptV12Envelope(env);
        if (msg) { renderMsg(msg); decrypted++; }
      } catch (_) {}
    }
    if (typeof data.next_cursor === 'number') _mailboxCursors[_dot1] = data.next_cursor;
    $mailboxStatus.textContent = envelopes.length > 0 ? `(${decrypted} new)` : '(no new)';
  } catch (err) {
    $mailboxStatus.textContent = '(relay err)';
  }
}

// Decrypt an incoming v1.2 envelope in the browser
async function decryptV12Envelope(env) {
  if (!env || env.version !== '1.2' || !env.cipher_body) return null;
  // Verify sig
  if (!verifyV12EnvelopeBrowser(env)) throw new Error('v1.2 sig invalid');
  // Find our wrap
  const wraps  = Array.isArray(env.wraps) ? env.wraps : [];
  const myWrap = wraps.find(w => w.recipient_dot1 === _dot1);
  if (!myWrap) return { ...env, decrypted: false, verified: true };
  // Unwrap + decrypt
  const bodyKeyHex = await unwrapBodyKeyBrowser(
    myWrap.wrapped_body_key, _x25519Priv, env.from_x25519_pub, _dot1, env.from_dot1
  );
  const contentBytes = await aesGcmDecrypt(env.cipher_body, bodyKeyHex);
  const content      = new TextDecoder().decode(contentBytes);
  return { ...env, content, decrypted: true, verified: true };
}

// ── room recipients panel ─────────────────────────────────────────────────────

function renderRecipientsPanel() {
  $recipientsChips.innerHTML = '';
  $recipientsChName.textContent = activeChannel;
  const list = getChannelRecipients(activeChannel);
  for (const r of list) {
    const chip = document.createElement('span');
    chip.className = 'recipient-chip';
    chip.innerHTML = `${esc(r.dot1.slice(-8))} <span class="rm-r" title="remove">✕</span>`;
    chip.querySelector('.rm-r').addEventListener('click', () => removeRecipient(activeChannel, r.dot1));
    $recipientsChips.appendChild(chip);
  }
}

$recipientAddBtn.addEventListener('click', () => {
  const dot1 = $recipientDot1In.value.trim();
  const pub  = $recipientX25519In.value.trim().toLowerCase();
  if (!dot1 || !/^dot1:[0-9a-f]{16}$/.test(dot1)) {
    alert('dot1 must match dot1:[0-9a-f]{16}');
    return;
  }
  if (pub.length !== 64 || !/^[0-9a-f]+$/.test(pub)) {
    alert('x25519_pub_hex must be 64 hex characters');
    return;
  }
  addRecipient(activeChannel, dot1, pub);
  $recipientDot1In.value = '';
  $recipientX25519In.value = '';
});

// ── name setup ────────────────────────────────────────────────────────────────
if (!myName) {
  $nameRow.classList.add('visible');
  $nameInput.focus();
} else {
  $msgInput.focus();
}

$nameBtn.addEventListener('click', saveName);
$nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') saveName(); });

function saveName() {
  const v = $nameInput.value.trim().slice(0, 24);
  if (!v) return;
  myName = v;
  localStorage.setItem(NAME_KEY, myName);
  $nameRow.classList.remove('visible');
  $msgInput.focus();
}

// ── attachment handling ───────────────────────────────────────────────────────

$attachBtn.addEventListener('click', () => $fileInput.click());

$fileInput.addEventListener('change', async () => {
  const MAX_FILES   = 4;
  const MAX_BYTES   = 1024 * 1024; // 1 MB per file (DOM constraint)
  const files = Array.from($fileInput.files || []).slice(0, MAX_FILES - pendingAtts.length);
  for (const file of files) {
    if (file.size > MAX_BYTES) { alert(`${file.name} exceeds 1 MB limit.`); continue; }
    try {
      const arrayBuf  = await file.arrayBuffer();
      const u8        = new Uint8Array(arrayBuf);
      const sha256    = await computeSha256Hex(u8);
      const b64       = uint8ToBase64(u8);
      pendingAtts.push({
        filename:    file.name.slice(0, 256),
        mime_type:   (file.type || 'application/octet-stream').slice(0, 128),
        size_bytes:  file.size,
        sha256,
        content_b64: b64,
      });
    } catch (err) {
      console.error('attachment encode error:', err);
    }
  }
  $fileInput.value = '';
  renderAttachPreview();
});

function renderAttachPreview() {
  $attachPreview.innerHTML = '';
  for (let i = 0; i < pendingAtts.length; i++) {
    const a   = pendingAtts[i];
    const el  = document.createElement('span');
    el.className = 'attach-chip-small';
    el.title     = `sha256: ${a.sha256}\nsize: ${a.size_bytes} bytes`;
    el.textContent = `${a.filename} (${formatBytes(a.size_bytes)}) ✕`;
    const idx = i;
    el.addEventListener('click', () => {
      pendingAtts.splice(idx, 1);
      renderAttachPreview();
    });
    $attachPreview.appendChild(el);
  }
}

async function computeSha256Hex(u8) {
  const hash   = await crypto.subtle.digest('SHA-256', u8);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function uint8ToBase64(u8) {
  let bin = '';
  for (const b of u8) bin += String.fromCharCode(b);
  return btoa(bin);
}

function formatBytes(n) {
  if (n < 1024) return n + ' B';
  if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
  return (n / 1024 / 1024).toFixed(1) + ' MB';
}

// ── channel management ────────────────────────────────────────────────────────

function renderChannelList() {
  $channelList.innerHTML = '';
  for (const ch of [...knownChannels].sort()) {
    const el = document.createElement('div');
    el.className = 'ch-item' + (ch === activeChannel ? ' active' : '');
    el.textContent = ch;
    el.addEventListener('click', () => switchChannel(ch));
    $channelList.appendChild(el);
  }
}

function switchChannel(ch) {
  if (ch === activeChannel) return;
  activeChannel = ch;
  $activeChBadge.textContent = ch;
  msgCount = 0;
  $statMsgs.textContent = '0';
  // clear message pane
  $msgs.querySelectorAll('.msg').forEach(el => el.remove());
  $empty.style.display = '';
  renderChannelList();
  renderRecipientsPanel();
  connectSSE();
  updateHash(ch);
}

function addChannelIfNew(ch) {
  if (!ch || knownChannels.has(ch)) return;
  knownChannels.add(ch);
  renderChannelList();
}

$chNameBtn.addEventListener('click', createChannel);
$chNameInput.addEventListener('keydown', e => { if (e.key === 'Enter') createChannel(); });

async function createChannel() {
  const raw = $chNameInput.value.trim().toLowerCase().replace(/[^a-z0-9-]/g, '-').slice(0, 32);
  if (!raw) return;
  if (!myName) { $nameRow.classList.add('visible'); $nameInput.focus(); return; }
  $chNameInput.value = '';
  // create by posting the first message; server auto-creates the channel
  addChannelIfNew(raw);
  switchChannel(raw);
  $msgInput.focus();
}

// ── send ──────────────────────────────────────────────────────────────────────
$sendBtn.addEventListener('click', sendMsg);
$msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});

async function sendMsg() {
  const text = $msgInput.value.trim();
  if (!text || !myName) {
    if (!myName) { $nameRow.classList.add('visible'); $nameInput.focus(); }
    return;
  }
  $sendBtn.disabled = true;
  try {
    const atts = [...pendingAtts];
    let payload;

    if (_encryptEnabled && hasV12Identity()) {
      // ── v1.2 E2E encrypted path ──────────────────────────────────────────────
      const recipients = getChannelRecipients(activeChannel);
      payload = await composeV12Envelope(text, activeChannel, atts, recipients);
      payload.author      = myName;
      payload.author_name = myName;

      if (_transport === 'mailbox') {
        // Send via mathpost-mailbox relay to each recipient's inbox
        const allRecipients = recipients.slice();
        if (!allRecipients.some(r => r.dot1 === _dot1)) {
          allRecipients.push({ dot1: _dot1, x25519PubHex: _x25519Pub });
        }
        let errors = 0;
        for (const r of allRecipients) {
          try {
            await fetch(`https://relay.piedpiper.fun/mailbox/${encodeURIComponent(r.dot1)}/push`, {
              method:  'POST',
              headers: { 'Content-Type': 'application/json' },
              body:    JSON.stringify(payload),
            });
          } catch (_) { errors++; }
        }
        $mailboxStatus.textContent = errors > 0 ? `(${errors} push err)` : '(sent)';
        // Also show locally so sender sees their own message
        const localMsg = { ...payload, content: text, decrypted: true, verified: true };
        renderMsg(localMsg);
        $msgInput.value = '';
        pendingAtts = [];
        renderAttachPreview();
        $msgInput.focus();
        return;
      }
      // else fall through to SSE relay POST below

    } else if (hasV11Identity()) {
      // ── v1.1 DOT-native: sign with cell key ──────────────────────────────────
      const signed = signMessageV11(text, activeChannel, atts);
      payload = {
        ...signed,
        author:      myName,
        author_name: myName,
      };
    } else {
      // ── v1.0 legacy: sign with browser keypair ────────────────────────────────
      const signing = _keypair ? signMessage(text, activeChannel) : {};
      payload = {
        content:     text,
        author:      myName,
        author_name: myName,
        channel:     activeChannel,
        ...signing,
      };
    }

    const resp = await fetch(`${BASE}messages?channel=${encodeURIComponent(activeChannel)}`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload),
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ error: resp.statusText }));
      console.error('send rejected:', err.error);
      alert(`Send failed: ${err.error}`);
      return;
    }

    $msgInput.value = '';
    pendingAtts = [];
    renderAttachPreview();
    $msgInput.focus();
  } catch (err) {
    console.error('send failed:', err);
    alert('Send failed: ' + err.message);
  } finally {
    $sendBtn.disabled = false;
  }
}

// ── SSE ───────────────────────────────────────────────────────────────────────
function connectSSE() {
  if (eventSource) { eventSource.close(); eventSource = null; }
  eventSource = new EventSource(`${BASE}events?channel=${encodeURIComponent(activeChannel)}`);
  eventSource.onmessage = e => {
    try { renderMsg(JSON.parse(e.data)); } catch (_) {}
  };
  eventSource.onerror = () => {
    if (eventSource) { eventSource.close(); eventSource = null; }
    setTimeout(connectSSE, 3000);
  };
}

// ── render ────────────────────────────────────────────────────────────────────
// renderMsg accepts both plain and encrypted messages.
// For v1.2 encrypted messages from SSE, it attempts async decryption and then
// updates the DOM element in place.
function renderMsg(msg) {
  $empty.style.display = 'none';

  const myPk  = pubkeyHex();
  const isOwn = (myPk && msg.pubkey === myPk) ||
                (_dot1 && msg.from_dot1 === _dot1) ||
                (msg.author === myName);

  const isEncrypted = msg.version === '1.2' || Boolean(msg.encrypted);

  const el = document.createElement('div');
  el.className = 'msg' + (isOwn ? ' own' : '') + (isEncrypted ? ' encrypted' : '');

  const ts = new Date(msg.createdAt).toLocaleTimeString('en', {
    hour: '2-digit', minute: '2-digit', hour12: false,
  });

  // Determine identity badge
  let identityBadge = '';
  if (isEncrypted) {
    const dot1Short = (msg.from_dot1 || '').replace('dot1:', '').slice(-6);
    const sigOk     = msg.verified !== undefined ? msg.verified : verifyV12EnvelopeBrowser(msg);
    if (msg.decrypted) {
      identityBadge = `<span class="decrypted-badge" title="E2E decrypted + sig verified">🔓 ${esc(dot1Short)}</span>`;
    } else {
      identityBadge = `<span class="seal-badge" title="sealed — ${sigOk ? 'sig ok' : 'sig unknown'}">🔒 ${esc(dot1Short)}</span>`;
    }
  } else if (msg.version === '1.1' && msg.from_dot1) {
    const dot1Short = msg.from_dot1.replace('dot1:', '').slice(-6);
    const verified  = verifyMessageV11(msg);
    identityBadge = verified
      ? `<span class="sig-ok" title="signature verified">✓ ${esc(dot1Short)}</span>`
      : `<span class="sig-none" title="signature not verified">? ${esc(dot1Short)}</span>`;
  } else if (msg.pubkeyShort) {
    identityBadge = `<span class="pubkey-tag">${esc(msg.pubkeyShort)}</span>`;
  } else if (msg.unsigned || msg.legacy) {
    identityBadge = `<span class="legacy-tag">unsigned</span>`;
  }

  const authorMeta = `<span class="msg-author">
    ${esc(msg.author_name || msg.author || (msg.from_dot1 ? msg.from_dot1.slice(-8) : 'anon'))}
    ${identityBadge}
  </span>`;

  el.innerHTML =
    `<div class="msg-meta">${authorMeta}<span class="msg-time">${ts}</span></div>` +
    `<div class="msg-text"></div>`;

  // Set content text: either plaintext (decrypted) or placeholder
  const contentEl = el.querySelector('.msg-text');
  if (isEncrypted && !msg.decrypted) {
    contentEl.textContent = '[sealed 🔒]';
    contentEl.style.color = 'var(--muted)';
    contentEl.style.fontStyle = 'italic';
    // Attempt async decryption and update in place
    if (hasV12Identity() && msg.cipher_body) {
      decryptV12Envelope(msg).then(dec => {
        if (dec && dec.decrypted) {
          contentEl.textContent = dec.content;
          contentEl.style.color = '';
          contentEl.style.fontStyle = '';
          // Update badge
          const badgeEl = el.querySelector('.seal-badge');
          if (badgeEl) {
            badgeEl.className = 'decrypted-badge';
            badgeEl.title     = 'E2E decrypted + sig verified';
            badgeEl.textContent = `🔓 ${badgeEl.textContent.replace('🔒 ', '')}`;
          }
        }
      }).catch(() => {});
    }
  } else {
    contentEl.textContent = msg.content || '';
  }

  // Render attachment chips
  if (Array.isArray(msg.attachments) && msg.attachments.length > 0) {
    const attEl = document.createElement('div');
    attEl.className = 'attachments';
    for (const a of msg.attachments) {
      const chip = document.createElement('div');
      chip.className = 'att-chip';
      chip.title     = `sha256: ${a.sha256}`;
      chip.innerHTML = `<span class="att-name">${esc(a.filename)}</span>` +
                       `<span class="att-size">${formatBytes(a.size_bytes)}</span>`;
      attEl.appendChild(chip);
    }
    el.appendChild(attEl);
  }

  $msgs.appendChild(el);
  $msgs.scrollTop = $msgs.scrollHeight;

  addChannelIfNew(msg.channel);
  msgCount++;
  $statMsgs.textContent = msgCount;
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

// ── health poll ───────────────────────────────────────────────────────────────
async function pollHealth() {
  try {
    const d = await (await fetch(`${BASE}health`)).json();
    $peers.textContent = d.peers || 0;
    $statMode.textContent  = d.iroh === 'connected' ? 'p2p' : 'relay';
    $statMode.style.color  = d.iroh === 'connected' ? 'var(--accent)' : 'var(--muted)';
  } catch (_) {}
}

// ── channel list poll ─────────────────────────────────────────────────────────
async function pollChannels() {
  try {
    const list = await (await fetch(`${BASE}channels`)).json();
    if (Array.isArray(list)) {
      for (const ch of list) addChannelIfNew(ch.name);
    }
  } catch (_) {}
}

// ── peer modal ────────────────────────────────────────────────────────────────
$peerBtn.addEventListener('click', openModal);

async function openModal() {
  $modal.classList.add('visible');
  $myTicket.textContent = 'fetching…';
  try {
    const d = await (await fetch(`${BASE}ticket`)).json();
    myTicket = d.ticket || null;
    $myTicket.textContent = d.ticket || d.error || 'iroh unavailable in relay-only mode';
  } catch (_) {
    $myTicket.textContent = 'could not fetch ticket';
  }
}

function closeModal() {
  $modal.classList.remove('visible');
  $peerIn.value = '';
}

function copyTicket() {
  if (myTicket) navigator.clipboard.writeText(myTicket).catch(() => {});
}

async function connectPeer() {
  const ticket = $peerIn.value.trim();
  if (!ticket) return;
  const btn = document.getElementById('connect-btn');
  btn.disabled = true; btn.textContent = 'connecting…';
  try {
    const r = await fetch(`${BASE}connect`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ ticket }),
    });
    const d = await r.json();
    if (d.ok) { closeModal(); pollHealth(); }
    else { alert('connection failed: ' + (d.error || 'unknown')); }
  } catch (err) {
    alert('connection failed: ' + err.message);
  } finally {
    btn.disabled = false; btn.textContent = 'connect';
  }
}

$modal.addEventListener('click', e => { if (e.target === $modal) closeModal(); });

// ── handle hash-based channel routing ────────────────────────────────────────
function parseHashChannel() {
  const m = location.hash.match(/^#\/r\/([a-z0-9-]{1,32})$/);
  return m ? m[1] : null;
}

function updateHash(ch) {
  history.replaceState(null, '', `#/r/${ch}`);
}

window.addEventListener('hashchange', () => {
  const ch = parseHashChannel();
  if (ch && ch !== activeChannel) switchChannel(ch);
});

// ── init ──────────────────────────────────────────────────────────────────────
(async () => {
  await loadOrCreateKeypair();
  updateKeyBanner();

  const hashCh = parseHashChannel();
  if (hashCh) { activeChannel = hashCh; $activeChBadge.textContent = hashCh; }

  renderChannelList();
  connectSSE();
  pollHealth();
  pollChannels();
  setInterval(pollHealth,   5_000);
  setInterval(pollChannels, 15_000);
  updateHash(activeChannel);
})();
</script>
