# example nginx config for chat.piedpiper.fun
# install certbot, then run: certbot --nginx -d chat.piedpiper.fun
# app runs on PORT 4101 (4100 is reserved for legacy pied-piper service)

server {
    listen 80;
    server_name chat.piedpiper.fun;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name chat.piedpiper.fun;

    # certbot will populate these:
    ssl_certificate     /etc/letsencrypt/live/chat.piedpiper.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.piedpiper.fun/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    nosniff always;
    add_header X-Frame-Options           DENY    always;
    add_header Referrer-Policy           "no-referrer" always;

    location / {
        proxy_pass         http://127.0.0.1:4101;
        proxy_http_version 1.1;

        # needed for SSE — disable buffering and set long read timeout
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     24h;

        # websocket upgrade headers (future-proof)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
